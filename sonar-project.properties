sonar.projectKey=taifjalo_student-timetable-management-system
sonar.organization=taif-jalo
sonar.projectName=Student Timetable Management System

# Sources & tests
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

sonar.host.url=https://sonarcloud.io

# JaCoCo coverage report (generated by mvn verify)
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclude JavaFX UI code from coverage so Sonar focuses on testable backend code
sonar.coverage.exclusions=src/main/java/org/controllers/**,src/main/java/org/application/**,src/main/java/org/service/LocalizationService.java,src/main/java/org/datasource/**

# Encoding
sonar.sourceEncoding=UTF-8

# Java version
sonar.java.source=21

# Static analysis report imports
sonar.java.checkstyle.reportPaths=target/checkstyle-result.xml
sonar.java.spotbugs.reportPaths=target/spotbugsXml.xml
sonar.java.pmd.reportPaths=target/pmd.xml
